name: Deploy «Вкусно как в Грузии» V3 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: V3/package-lock.json

      - name: Sync Telegram animated emojis
        run: node scripts/sync-telegram-emojis.mjs

      - name: Link public assets into V3
        run: cp -r public V3/public

      - name: Install V3 dependencies
        working-directory: V3
        run: npm ci

      - name: Build V3 static site
        working-directory: V3
        run: npm run build
        env:
          SKIP_VERIFY_EXPORT: "1"
          BASE_PATH: /GE_Vol.2

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: V3/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
